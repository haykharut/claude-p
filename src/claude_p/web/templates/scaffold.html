{% extends "base.html" %}
{% block title %}New job — claude-p{% endblock %}
{% block main %}
<h1>New job</h1>
<div class="subtitle">Describe it. Claude writes the folder.</div>

<form method="post" action="/scaffold" class="spaced" style="max-width: 640px">
  <div class="field">
    <label for="slug">Slug</label>
    <input id="slug" name="slug" type="text" required pattern="[a-z0-9][a-z0-9_\-]*"
           placeholder="scan-job-boards" />
  </div>
  <div class="field">
    <label for="description">What should this job do?</label>
    <textarea id="description" name="description" required rows="8"
              placeholder="Every morning at 9am, scrape HN &quot;Who's hiring&quot; + YC job board for Python infra roles in Europe. Save a markdown digest as digest.md."></textarea>
  </div>
  <button type="submit" class="primary">Scaffold</button>
</form>
{% endblock %}
