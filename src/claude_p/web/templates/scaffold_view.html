{% extends "base.html" %}
{% block title %}Scaffolding {{ scaffold.slug }} — claude-p{% endblock %}
{% block main %}
<div class="crumb"><a href="/scaffold">New job</a><span class="sep">›</span><span class="mono">{{ scaffold.slug }}</span></div>

<div class="row-between">
  <h1 class="mono">{{ scaffold.slug }}</h1>
  <div id="status"><span class="status"><span class="dot"></span>starting…</span></div>
</div>
<div class="subtitle">{{ scaffold.description }}</div>

<ul id="events" class="trace-events"></ul>

<p class="muted small" id="footer" style="display:none; margin-top: 1rem">
  <a href="/jobs/{{ scaffold.slug }}">Open the job →</a>
</p>

<script>
(function() {
  const events = document.getElementById('events');
  const status = document.getElementById('status');
  const footer = document.getElementById('footer');
  const src = new EventSource("/scaffold/{{ scaffold.id }}/stream");

  function summarize(data) {
    try {
      const e = JSON.parse(data);
      const d = e.data || {};
      switch (e.kind) {
        case 'session_start':
          return 'session started';
        case 'assistant_text_delta':
          return '💬 ' + (d.text || '').slice(0, 500);
        case 'tool_use':
          return '→ ' + (d.name || '') + ' ' + JSON.stringify(d.input || {}).slice(0, 200);
        case 'tool_result':
          return '(tool result)' + (d.output_preview ? ' — ' + d.output_preview.slice(0, 200) : '');
        case 'rate_limit':
          return '⏱ rate limit · ' + ((d.info && d.info.rateLimitType) || '');
        case 'result':
          return '✓ finished · $' + (d.cost_usd || 0).toFixed(4);
        case 'raw':
          return '(raw) ' + JSON.stringify(d.payload || {}).slice(0, 200);
        default:
          return e.kind || JSON.stringify(e).slice(0, 200);
      }
    } catch (err) {
      return data.slice(0, 200);
    }
  }

  src.addEventListener('trace', (ev) => {
    const li = document.createElement('li');
    li.textContent = summarize(ev.data);
    events.appendChild(li);
    status.innerHTML = '<span class="status warn"><span class="dot"></span>running</span>';
    li.scrollIntoView({ behavior: 'smooth', block: 'end' });
  });
  src.addEventListener('end', (ev) => {
    let data = {};
    try { data = JSON.parse(ev.data); } catch (e) {}
    if (data.exit_code === 0) {
      status.innerHTML = '<span class="status ok"><span class="dot"></span>done</span>';
    } else {
      status.innerHTML = '<span class="status err"><span class="dot"></span>exit ' +
        data.exit_code + (data.error ? ' — ' + data.error : '') + '</span>';
    }
    footer.style.display = 'block';
    src.close();
  });
  src.onerror = () => {};
})();
</script>
{% endblock %}
