repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.408
    hooks:
      - id: pyright
        additional_dependencies:
          - fastapi
          - pydantic
          - pydantic-settings
          - pyyaml
          - watchfiles
          - croniter
          - wsgidav
          - a2wsgi
          - jinja2
          - python-multipart
          - argon2-cffi
          - itsdangerous
          - sse-starlette
          - httpx

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
